name: odes
services:
  api:
    build:
      context: ../../..
      dockerfile: app/services/api/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ../../.env

  worker:
    build:
      context: ../../..
      dockerfile: app/services/worker/Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ../../.env
    depends_on:
      - rabbitmq
    # CP-SAT scales near-linearly with search workers when the model fits
    # in memory.  The new interval-based formulation is ~50× smaller than
    # the old one, so 8 parallel CP-SAT workers fit comfortably under
    # 12 GB.  Match Docker's CPU allocation to the CP-SAT parallelism so
    # we actually use the cores we're requesting.
    cpus: 8.0
    mem_limit: 12g
    memswap_limit: 12g

  rabbitmq:
    image: rabbitmq:4.1.5-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  flower:
    image: mher/flower
    ports:
      - "5555:5555"
    env_file:
      - ../../.env
    depends_on:
      - rabbitmq

  ui:
    build:
      context: ../../..
      dockerfile: app/services/ui/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - api
    env_file:
      - ../../.env