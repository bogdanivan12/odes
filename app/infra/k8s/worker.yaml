apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: odes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: registry-odes-app
      containers:
        - name: worker
          image: registry.digitalocean.com/odes-app/odes-worker:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: odes-secret
          env:
            # CP-SAT search parallelism — 3 workers on the 4 vCPU node.
            # Leaves ~1 vCPU headroom for the API and UI pods on the same node.
            # Override to 8 in compose (12 GB / 8 CPUs available there).
            - name: NUM_SEARCH_WORKERS
              value: "3"
            # Optional: set to "1" to skip phase-2 optimisation and return the
            # first feasible schedule (diagnostic / fast-path).  "0" = full
            # two-phase solve (feasibility then warm-started optimisation).
            - name: SCHEDULE_FEASIBILITY_ONLY
              value: "0"
          resources:
            requests:
              cpu: "1500m"
              memory: "4Gi"
            limits:
              cpu: "3"      # Reserve 1 vCPU for API + UI
              memory: "5Gi"
