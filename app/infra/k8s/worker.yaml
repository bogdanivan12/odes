apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: odes
spec:
  # replicas is managed by KEDA (0 when idle, 1 during generation)
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: registry-odes-app
      containers:
        - name: worker
          image: registry.digitalocean.com/odes-app/odes-worker:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: odes-secret
          resources:
            requests:
              cpu: "1200m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
