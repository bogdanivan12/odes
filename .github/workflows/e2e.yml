name: E2E Tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create .env file
        env:
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
        run: |
          # Use a dedicated e2e database so tests never touch production data.
          # RabbitMQ runs inside compose — use the default guest credentials.
          cat > app/.env << EOF
          MONGODB_URI=${MONGODB_URI}
          DB_NAME=odes_e2e
          CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672/
          API_URL=http://api:8080
          SECRET_KEY=${SECRET_KEY}
          DEFAULT_ALGORITHM=HS256
          EXPIRES_DELTA=30
          REFRESH_EXPIRES_DELTA=10080
          EOF

      - name: Start services
        run: |
          docker compose \
            -f app/infra/compose/compose.yaml \
            -f app/infra/compose/compose.ci.yml \
            up -d --build

      - name: Wait for API to be healthy
        run: |
          curl --retry 30 --retry-delay 5 --retry-connrefused \
            --max-time 10 \
            http://localhost:8080/docs

      - name: Wait for UI to be healthy
        run: |
          curl --retry 20 --retry-delay 3 --retry-connrefused \
            --max-time 10 \
            http://localhost

      - name: Install E2E dependencies
        working-directory: app/e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app/e2e
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: app/e2e
        run: npx playwright test

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: app/e2e/playwright-report/
          retention-days: 30
